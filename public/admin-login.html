<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Login Admin - MeetGay</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>👑 Admin Login</h1>
        <input type="password" id="adminPassword" placeholder="Mot de passe administrateur">
        <button onclick="loginAdmin()">Se connecter</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        async function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMsg');

            if (!password) {
                errorDiv.textContent = 'Veuillez entrer le mot de passe';
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = '/admin.html';
                } else {
                    errorDiv.textContent = 'Mot de passe incorrect';
                }
            } catch (err) {
                errorDiv.textContent = 'Erreur de connexion';
            }
        }

        // Si déjà connecté, rediriger vers admin
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin.html';
        }
    </script>
</body>

</html>
