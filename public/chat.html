<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetGay - Chat</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="header-content">
            <div class="logo">
                <h1>💬 MeetGay</h1>
                <p>Belgique - Rencontres et discussions</p>
            </div>
            <div class="user-badge" id="userBadge">👤 Chargement...</div>
        </div>
    </header>

    <div class="main-container">
        <div class="container">
            <div class="users-panel">
                <h3 id="connectedTitle">👥 Connectés</h3>
                <div id="usersList">En attente...</div>
            </div>

            <div class="chat-panel">
                <div id="contactInfo" class="contact-info">
                    <div><span class="contact-name" id="contactName"></span>
                        (<span id="contactAge"></span> ans, <span id="contactGender"></span>, <span
                            id="contactOrientation"></span>)
                    </div>
                    <div id="contactPurpose" style="margin-top: 5px; font-size: 12px; color: #555;"></div>
                    <div class="contact-bio" id="contactBio"></div>
                </div>

                <div class="message-area" id="messageArea">
                    <div class="empty-message">💬 En attente de message...</div>
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="" disabled>
                    <button id="sendBtn" disabled>✉️ Envoyer</button>
                </div>

                <div id="envelope" class="envelope" style="display: none;">✉️</div>
            </div>

            <div class="history-panel">
                <h4 id="historyTitle">📋 Historique</h4>
                <div id="historyList">
                    <div class="empty-message" style="padding: 20px;">Aucune conversation</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            © 2026 MeetGay - Chat Belgique -
            <a href="#">Mentions légales</a> -
            <a href="#">Contact</a>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        // ========== VÉRIFICATION JWT ==========
        const token = localStorage.getItem('meetgay_token');
        if (!token) {
            window.location.href = '/login.html';
        }

        // ========== LECTURE DE LA LANGUE ==========
        let chatLang = localStorage.getItem('MeetGay_lang') || 'fr';

        // ========== TRADUCTIONS ==========
        const chatTranslations = {
            fr: {
                emptyMessage: "💬 En attente de message...",
                placeholderInput: "Cliquez sur un pseudo d'abord...",
                sendBtn: "✉️ Envoyer",
                historyTitle: "📋 Historique",
                connectedTitle: "👥 Connectés"
            },
            nl: {
                emptyMessage: "💬 Wachten op bericht...",
                placeholderInput: "Klik eerst op een pseudoniem...",
                sendBtn: "✉️ Verstuur",
                historyTitle: "📋 Historisch",
                connectedTitle: "👥 Aangesloten"
            }
        };

        const t = chatTranslations[chatLang];

        // ← AJOUT : Exporter les globales pour ui.js et history.js
            window.chatLang = chatLang;
            window.chatT = chatTranslations[chatLang];

        // ========== APPLICATION DES TEXTES ==========
        document.addEventListener('DOMContentLoaded', () => {
                // ← AJOUT : Mettre à jour les globales au cas où
                window.chatLang = chatLang;
                window.chatT = chatTranslations[chatLang];

                const msgArea = document.getElementById('messageArea');
                if (msgArea) msgArea.innerHTML = `<div class="empty-message">${t.emptyMessage}</div>`;

                const historyDiv = document.getElementById('historyList');
                if (historyDiv) historyDiv.innerHTML = `<div class="empty-message" style="padding: 20px;">Aucune conversation</div>`;

                const sendBtn = document.getElementById('sendBtn');
                if (sendBtn) sendBtn.innerHTML = t.sendBtn;

                const messageInput = document.getElementById('messageInput');
                if (messageInput) messageInput.placeholder = t.placeholderInput;

                const historyTitle = document.getElementById('historyTitle');
                if (historyTitle) historyTitle.innerHTML = t.historyTitle;

                const connectedTitle = document.getElementById('connectedTitle');
                if (connectedTitle) connectedTitle.innerHTML = t.connectedTitle;
            });
    </script>

    <script src="/js/utils.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/chat.js"></script>
</body>

</html>
